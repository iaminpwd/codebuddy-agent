openapi: 3.0.0
info:
  title: CodeBuddy Agent Action Group Tools
  version: 1.0.0
  description: CodeBuddy Agent Tools
paths:
  /github/pr:
    get:
      summary: Get GitHub PR
      description: Get GitHub PR details
      operationId: get_github_pr
      parameters:
        - name: owner
          in: query
          required: true
          description: GitHub Repository Owner
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: GitHub Repository Name
          schema:
            type: string
        - name: pr_number
          in: query
          required: true
          description: PR Number
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
  /github/comment:
    post:
      summary: PR 코멘트 등록
      description: 리뷰 코멘트를 등록합니다.
      operationId: post_pr_comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner, repo, pr_number, comment]
              properties:
                owner:
                  type: string
                  description: Repository owner
                repo:
                  type: string
                  description: Repository name
                pr_number:
                  type: integer
                  description: PR number
                comment:
                  type: string
                  description: Review comment
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
  /analyze/complexity:
    post:
      summary: 복잡도 분석
      description: 코드 복잡도를 산출합니다.
      operationId: analyze_complexity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Source code
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
  /generate/test:
    post:
      summary: 단위 테스트 생성
      description: 테스트 코드 가이드를 반환합니다.
      operationId: generate_unit_test
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Source code
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
  /analyze/refactor:
    post:
      summary: 코드 리팩토링
      description: 클린 코드 리팩토링 가이드를 반환합니다.
      operationId: suggest_refactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Source code
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
  /slack/send:
    post:
      summary: Slack 전송
      description: 결과를 슬랙에 전송합니다.
      operationId: send_slack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pr_url, status, summary]
              properties:
                pr_url:
                  type: string
                  description: PR URL
                status:
                  type: string
                  description: Review Status
                summary:
                  type: string
                  description: Review Summary
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
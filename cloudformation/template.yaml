AWSTemplateFormatVersion: '2010-09-09'
Description: 'CodeBuddy Infrastructure - Production Grade Serverless Stack'

Parameters:
  S3BucketName:
    Type: String
    Description: 'S3 Bucket Name for Lambda code and API Schema'
  GitHubToken:
    Type: String
    NoEcho: true
    Description: 'GitHub Personal Access Token for PR I/O'
  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Description: 'Slack Incoming Webhook URL for Notifications'
  WebhookSecret:
    Type: String
    NoEcho: true
    Description: 'GitHub Webhook Secret for signature verification'

Resources:
  # 1. IAM Role (최소 권한 원칙 적용)
  OrchestratorLambdaRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: codebuddy-lambda-execution-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 'arn:aws:logs:*:*:log-group:/aws/lambda/codebuddy-*'
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeAgent'
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${CodeBuddyAgent}/*'
              - Effect: Allow
                Action:
                  - 'lambda:InvokeFunction'
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:codebuddy-orchestrator'

  # 1-1. Bedrock Agent IAM Role
  BedrockAgentServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'
      Policies:
        - PolicyName: bedrock-invoke-model
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'

  # 2. API Gateway REST API 정의
  CodeBuddyApi:
    Type: 'AWS::ApiGateway::RestApi'
    Properties:
      Name: CodeBuddyAPI
      EndpointConfiguration:
        Types: [REGIONAL]

  # 3. API Gateway /review 엔드포인트 리소스 생성
  ReviewResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ParentId: !GetAtt CodeBuddyApi.RootResourceId
      PathPart: review

  # 4. API Gateway POST Method 정의 (API Key 검증 필수 설정)
  ReviewPostMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ResourceId: !Ref ReviewResource
      HttpMethod: POST
      ApiKeyRequired: true
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorLambda.Arn}/invocations'

  # 5. API Gateway 배포 및 스테이지 설정
  ApiDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    DependsOn: ReviewPostMethod
    Properties:
      RestApiId: !Ref CodeBuddyApi

  ApiStage:
    Type: 'AWS::ApiGateway::Stage'
    Properties:
      RestApiId: !Ref CodeBuddyApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  # 6. API Key 및 사용량 계획(Rate Limiting) 통합 관리
  CodeBuddyApiKey:
    Type: 'AWS::ApiGateway::ApiKey'
    Properties:
      Name: codebuddy-webhook-key
      Enabled: true

  CodeBuddyUsagePlan:
    Type: 'AWS::ApiGateway::UsagePlan'
    Properties:
      UsagePlanName: codebuddy-rate-limit-plan
      Throttle:
        BurstLimit: 10
        RateLimit: 5
      ApiStages:
        - ApiId: !Ref CodeBuddyApi
          Stage: !Ref ApiStage

  UsagePlanKeyLink:
    Type: 'AWS::ApiGateway::UsagePlanKey'
    Properties:
      KeyId: !Ref CodeBuddyApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref CodeBuddyUsagePlan

  # 7. Lambda Permission (API Gateway가 Lambda를 호출할 수 있도록 허용)
  LambdaInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !Ref OrchestratorLambda
      Action: 'lambda:InvokeFunction'
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CodeBuddyApi}/*/POST/review'

  # [추가됨] Bedrock Agent가 Lambda를 Action Group 도구로써 실행하도록 허용
  BedrockAgentInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !Ref OrchestratorLambda
      Action: 'lambda:InvokeFunction'
      Principal: 'bedrock.amazonaws.com'
      # 특정 Agent ID에서만 호출 가능하도록 보안 격리 (PoLP)
      SourceArn: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/${CodeBuddyAgent}'

  # [NEW] Bedrock Agent 자동 생성
  CodeBuddyAgent:
    Type: 'AWS::Bedrock::Agent'
    Properties:
      AgentName: 'CodeBuddy-Reviewer-IaC'
      AutoPrepare: true
      Description: 'GitHub PR Auto Review Agent provisioned via CloudFormation'
      AgentResourceRoleArn: !GetAtt BedrockAgentServiceRole.Arn
      FoundationModel: 'anthropic.claude-3-5-sonnet-20240620-v1:0'
      Instruction: |
        너는 수석 데브옵스 아키텍트이자 10년 차 시니어 개발자 수준의 코드 리뷰어(CodeBuddy)다.
        GitHub Pull Request 이벤트가 발생하면, 반드시 제공된 Action Group 도구들을 순차적으로 호출하여 다음 임무를 수행해야 한다.
        
        1. get_github_pr: PR의 변경된 소스 코드와 Diff를 가져온다.
        2. analyze_complexity: 코드가 복잡한지 순환 복잡도를 분석한다.
        3. generate_unit_test & suggest_refactor: 테스트 코드와 클린 코드 관점의 리팩토링을 제안한다.
        4. post_pr_comment: 위 분석 결과를 종합하여 마크다운 형태의 상세한 리뷰 코멘트를 GitHub PR에 등록한다.
        5. send_slack: 모든 작업이 끝나면 최종 리뷰 요약을 Slack으로 전송한다.
        
        명확한 근거(공식 문서, PEP8 등)를 바탕으로 객관적이고 전문적인 어조로 리뷰를 작성하라.
      ActionGroups:
        - ActionGroupName: 'CodeBuddyActions'
          ActionGroupState: 'ENABLED'
          ActionGroupExecutor:
            Lambda: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:codebuddy-orchestrator'
          ApiSchema:
            S3:
              S3BucketName: !Ref S3BucketName
              S3ObjectKey: 'api-spec.yaml'

  CodeBuddyAgentAlias:
    Type: 'AWS::Bedrock::AgentAlias'
    Properties:
      AgentId: !Ref CodeBuddyAgent
      AgentAliasName: 'prod'
      Description: 'Production Alias for CodeBuddy'



  # 8. Orchestrator Lambda Function 정의
  OrchestratorLambda:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: codebuddy-orchestrator
      Runtime: python3.12
      Handler: orchestrator.handler
      Role: !GetAtt OrchestratorLambdaRole.Arn
      Timeout: 300
      MemorySize: 1024

      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: 'lambda_code.zip'
      Environment:
        Variables:
          AGENT_ID: !Ref CodeBuddyAgent
          ALIAS_ID: 'TSTALIASID'
          GITHUB_TOKEN: !Ref GitHubToken
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          WEBHOOK_SECRET: !Ref WebhookSecret

Outputs:
  WebhookEndpoint:
    Description: 'GitHub Webhook Payload URL로 등록할 API Gateway 엔드포인트'
    Value: !Sub 'https://${CodeBuddyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/review'
  ApiKeySecret:
    Description: 'API Gateway 요청 시 x-api-key 헤더에 포함할 인증 키'
    Value: !Ref CodeBuddyApiKey